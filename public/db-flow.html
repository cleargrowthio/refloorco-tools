<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReFloorCo — Design & Build Flow</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #f8f7f4;
  --surface:    #ffffff;
  --border:     #e4e1da;
  --border-md:  #c8c4bc;
  --text:       #1a1a18;
  --text-2:     #5a5a56;
  --text-3:     #9a9994;
  --dark:       #1c1c1c;
  --purple-bg:  #EEEDFE;
  --purple-bd:  #AFA9EC;
  --purple-tx:  #3C3489;
  --purple-dk:  #26215C;
  --green-bg:   #eaf3de;
  --green-bd:   #97c459;
  --green-tx:   #27500a;
  --green-mid:  #3B6D11;
  --amber-bg:   #faeeda;
  --amber-bd:   #ef9f27;
  --amber-tx:   #412402;
  --amber-mid:  #633806;
  --blue-bg:    #E6F1FB;
  --blue-bd:    #85B7EB;
  --blue-tx:    #0C447C;
  --blue-mid:   #185FA5;
  --red-bg:     #fcebeb;
  --red-bd:     #f09595;
  --red-tx:     #791f1f;
  --red-mid:    #A32D2D;
  --gray-bg:    #F4F4F2;
  --gray-bd:    #C8C4BC;
  --gray-tx:    #2C2C2A;
  --gray-mid:   #5F5E5A;
  --radius:     10px;
  --radius-lg:  14px;
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem 4rem;
}

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap');

.header {
  width: 100%;
  max-width: 700px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.brand    { font-size: 13px; font-weight: 500; color: var(--text-3); letter-spacing: .06em; text-transform: uppercase; }
.doc-title{ font-size: 13px; color: var(--text-2); }

.progress-wrap { width: 100%; max-width: 700px; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 4px; }
.progress { display: flex; align-items: center; gap: 0; min-width: max-content; }

.step-dot {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; flex-shrink: 0;
  cursor: pointer; transition: all .2s;
  border: 1px solid var(--border-md);
  background: var(--surface); color: var(--text-3);
}
.step-dot:hover          { border-color: var(--text-3); color: var(--text-2); }
.step-dot.active         { background: var(--purple-dk); border-color: var(--purple-dk); color: #fff; }
.step-dot.done           { background: var(--purple-bg); border-color: var(--purple-bd); color: var(--purple-tx); }
.step-dot.gate-active    { background: #854F0B; border-color: #854F0B; color: #fff; }
.step-dot.gate-done      { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber-tx); }

.step-line { flex: 1; height: 1px; background: var(--border); min-width: 10px; transition: background .3s; }
.step-line.done { background: var(--purple-bd); }

.card {
  width: 100%; max-width: 700px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.75rem;
  animation: fadeIn .25s ease;
}
.card.gate-card { border: 2px solid var(--amber-bd); }
.card.fork-card { border: 2px solid var(--purple-bd); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.step-tag   { font-size: 11px; font-weight: 500; color: var(--text-3); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
.step-title { font-size: 21px; font-weight: 500; color: var(--text); margin-bottom: 10px; line-height: 1.25; }
.step-body  { font-size: 14px; color: var(--text-2); line-height: 1.7; margin-bottom: 1.25rem; }

.banner { padding: 12px 16px; margin-bottom: 1.25rem; border-left: 3px solid; border-radius: 0; }
.banner.amber  { background: var(--amber-bg); border-color: var(--amber-bd); }
.banner.purple { background: var(--purple-bg); border-color: var(--purple-bd); }
.banner-title  { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
.banner.amber  .banner-title { color: var(--amber-tx); }
.banner.purple .banner-title { color: var(--purple-tx); }
.banner-body { font-size: 13px; line-height: 1.55; }
.banner.amber  .banner-body { color: var(--amber-mid); }
.banner.purple .banner-body { color: var(--purple-tx); }

.fork-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.fork-inner { border-radius: var(--radius); padding: 14px; border: 1px solid; }
.fork-inner.verbal   { background: var(--green-bg); border-color: var(--green-bd); }
.fork-inner.document { background: var(--blue-bg);  border-color: var(--blue-bd); }
.fork-trigger { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; font-family: 'DM Mono', monospace; }
.fork-inner.verbal   .fork-trigger { color: var(--green-mid); }
.fork-inner.document .fork-trigger { color: var(--blue-mid); }
.fork-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.fork-inner.verbal   .fork-title { color: var(--green-tx); }
.fork-inner.document .fork-title { color: var(--blue-tx); }
.fork-body { font-size: 12px; line-height: 1.55; }
.fork-inner.verbal   .fork-body { color: var(--green-mid); }
.fork-inner.document .fork-body { color: var(--blue-mid); }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
.detail-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
.detail-label { font-size: 10px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
.detail-value { font-size: 13px; color: var(--text); font-weight: 500; line-height: 1.4; }

.scripts-wrap { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
.script-box   { background: var(--dark); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 1rem; }
.script-label { font-size: 10px; color: #777; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
.script-text  { font-size: 13px; color: #d8d6d0; line-height: 1.65; font-style: italic; }

.rules { margin-bottom: 1.25rem; }
.rule-row { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-2); line-height: 1.5; }
.rule-row:last-child { border-bottom: none; }
.rule-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.rule-dot.green  { background: #639922; }
.rule-dot.red    { background: #E24B4A; }
.rule-dot.amber  { background: #BA7517; }
.rule-dot.purple { background: #534AB7; }

.outcome-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
.outcome-card { border-radius: var(--radius); padding: 12px 14px; border: 1px solid; }
.outcome-card.yes { background: var(--green-bg); border-color: var(--green-bd); }
.outcome-card.no  { background: var(--red-bg);   border-color: var(--red-bd); }
.outcome-title { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
.outcome-card.yes .outcome-title { color: var(--green-tx); }
.outcome-card.no  .outcome-title { color: var(--red-tx); }
.outcome-body { font-size: 12px; line-height: 1.55; }
.outcome-card.yes .outcome-body { color: var(--green-mid); }
.outcome-card.no  .outcome-body { color: var(--red-mid); }

.tier-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
.tier-card { border-radius: var(--radius); padding: 10px 12px; border: 1px solid; }
.tier-card.t1 { background: var(--gray-bg);   border-color: var(--gray-bd); }
.tier-card.t2 { background: var(--blue-bg);   border-color: var(--blue-bd); }
.tier-card.t3 { background: var(--green-bg);  border-color: var(--green-bd); }
.tier-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
.tier-card.t1 .tier-name { color: var(--gray-tx); }
.tier-card.t2 .tier-name { color: var(--blue-tx); }
.tier-card.t3 .tier-name { color: var(--green-tx); }
.tier-range { font-size: 11px; }
.tier-card.t1 .tier-range { color: var(--gray-mid); }
.tier-card.t2 .tier-range { color: var(--blue-mid); }
.tier-card.t3 .tier-range { color: var(--green-mid); }
.tier-desc { font-size: 11px; color: var(--text-3); margin-top: 3px; line-height: 1.4; }

.nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.nav-btn {
  font-size: 13px; font-weight: 500; padding: 7px 18px;
  border-radius: var(--radius); cursor: pointer;
  background: transparent; border: 1px solid var(--border-md);
  color: var(--text); transition: all .15s; font-family: inherit;
}
.nav-btn:hover:not(:disabled) { background: var(--bg); border-color: var(--text-3); }
.nav-btn:active:not(:disabled){ transform: scale(.98); }
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }
.nav-btn.primary  { background: var(--purple-dk); border-color: var(--purple-dk); color: #fff; }
.nav-btn.primary:hover { background: var(--purple-tx); }
.step-counter { font-size: 12px; color: var(--text-3); font-family: 'DM Mono', monospace; }
</style>
</head>

let cur = 0;

function render() {
  const s = steps[cur];
  const total = steps.length;

  let prog = '';
  for (let i = 0; i < total; i++) {
    let cls = '';
    const isGate = steps[i].type === 'gate';
    if (i < cur)      cls = isGate ? 'gate-done'   : 'done';
    else if (i === cur) cls = isGate ? 'gate-active' : 'active';
    prog += `<div class="step-dot ${cls}" onclick="goTo(${i})" title="Step ${i+1}">${i < cur ? '✓' : i+1}</div>`;
    if (i < total - 1) prog += `<div class="step-line ${i < cur ? 'done' : ''}"></div>`;
  }
  document.getElementById('progress').innerHTML = prog;

  const cardEl = document.getElementById('card');
  let cardClass = 'card';
  if (s.type === 'gate') cardClass += ' gate-card';
  if (s.type === 'fork') cardClass += ' fork-card';
  cardEl.className = cardClass;

  let h = `<div class="step-tag">${s.tag}</div><div class="step-title">${s.title}</div><div class="step-body">${s.body}</div>`;

  if (s.type === 'gate') {
    h += `<div class="banner amber"><div class="banner-title">Qualification gate</div><div class="banner-body">No site visit is booked until confirmation is received — verbal on the call (Mode A) or written reply (Mode B). This rule protects rep time.</div></div>`;
  }

  if (s.type === 'fork' && s.fork) {
    h += `<div class="fork-grid">
      <div class="fork-inner verbal">
        <div class="fork-trigger">Trigger — ${s.fork.verbal.trigger}</div>
        <div class="fork-title">${s.fork.verbal.title}</div>
        <div class="fork-body">${s.fork.verbal.body}</div>
      </div>
      <div class="fork-inner document">
        <div class="fork-trigger">Trigger — ${s.fork.document.trigger}</div>
        <div class="fork-title">${s.fork.document.title}</div>
        <div class="fork-body">${s.fork.document.body}</div>
      </div>
    </div>`;
  }

  if (s.tiers) {
    h += `<div class="tier-row">
      <div class="tier-card t1"><div class="tier-name">Refresh</div><div class="tier-range">$8k–$18k</div><div class="tier-desc">Paint, LVP, cabinet paint, fixtures, trim, basic bath refresh</div></div>
      <div class="tier-card t2"><div class="tier-name">Renovate</div><div class="tier-range">$18k–$45k</div><div class="tier-desc">Refresh + countertops, vanities, doors, plumbing fixtures, exterior</div></div>
      <div class="tier-card t3"><div class="tier-name">Transform</div><div class="tier-range">$45k+</div><div class="tier-desc">Full gut, custom design per property layout, all trades</div></div>
    </div>`;
  }

  if (s.details) {
    h += '<div class="detail-grid">';
    s.details.forEach(d => {
      h += `<div class="detail-card"><div class="detail-label">${d.label}</div><div class="detail-value">${d.value}</div></div>`;
    });
    h += '</div>';
  }

  if (s.scripts) {
    h += '<div class="scripts-wrap">';
    s.scripts.forEach(sc => {
      h += `<div class="script-box"><div class="script-label">${sc.label}</div><div class="script-text">${sc.text}</div></div>`;
    });
    h += '</div>';
  } else if (s.script) {
    h += `<div class="script-box"><div class="script-label">${s.script.label}</div><div class="script-text">${s.script.text}</div></div>`;
  }

  if (s.rules && s.rules.length) {
    h += '<div class="rules">';
    s.rules.forEach(r => {
      h += `<div class="rule-row"><div class="rule-dot ${r.type}"></div><span>${r.text}</span></div>`;
    });
    h += '</div>';
  }

  if (s.outcomes) {
    h += '<div class="outcome-row">';
    if (s.outcomes.yes) h += `<div class="outcome-card yes"><div class="outcome-title">${s.outcomes.yes.title}</div><div class="outcome-body">${s.outcomes.yes.body}</div></div>`;
    if (s.outcomes.no)  h += `<div class="outcome-card no"><div class="outcome-title">${s.outcomes.no.title}</div><div class="outcome-body">${s.outcomes.no.body}</div></div>`;
    h += '</div>';
  }

  const isLast = cur === total - 1;
  h += `<div class="nav">
    <button class="nav-btn" onclick="goTo(${cur-1})" ${cur===0?'disabled':''}>← Previous</button>
    <span class="step-counter">${cur+1} / ${total}</span>
    <button class="nav-btn ${isLast?'':'primary'}" onclick="goTo(${cur+1})" ${isLast?'disabled':''}>
      ${isLast ? 'Complete' : 'Next →'}
    </button>
  </div>`;

  cardEl.innerHTML = h;
}

function goTo(i) {
  if (i < 0 || i >= steps.length) return;
  cur = i;
  render();
}

render();
</script>
</body>
</html>
